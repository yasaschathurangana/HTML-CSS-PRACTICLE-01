<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .one, .two, .three, .four{
           padding: 20px;
           text-align: center;
           font-size: 36px;
           color: rgb(0, 0, 0);  
           font-weight: bold;  
        }

        .one{
            background-color: #ff0000;
        }
        .two{
            background-color: #8dff8d;
        }
        .three{
            background-color: #0000ff;
        }
        .four{
            background-color: #ffff00;
        }

        .flexiblbox{
            border: 2px solid #000000;
            display: flex;

            flex-direction: column;
            flex-direction: column-reverse;
        }
    </style>
</head>
<body>
    <div class="flexiblbox">
        <p class="one">a</p>
        <p class="two">b</p>
        <p class="three">c</p>
        <p class="four">d</p>
    </div>

   

    
</body>
</html>
