<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .wrapper{
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid #000000;
            
        }
        .one, .two, .three, .four{
           padding: 20px;
           text-align: center;
           font-size: 36px;
           color: rgb(0, 0, 0);  
           font-weight: bold;  
        }

        .one{
            background-color: #ff0000;
            flex-grow:1;
         
        }
        .two{
            background-color: #8dff8d;
            flex-grow:3;
         
        }
        .three{
            background-color: #0000ff;
            flex-grow:5;
        }
        .four{
            background-color: #ffff00;
           flex-grow:7;
        }

        .flexiblbox{
            display: flex;
            flex-wrap: wrap;
            flex-wrap: wrap-reverse;
            flex-wrap: nowrap;     
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="flexiblbox">
        <p class="one">a</p>
        <p class="two">b</p>
        <p class="three">c</p>
        <p class="four">d</p>
    </div>
</div>


   

    
</body>
</html>
